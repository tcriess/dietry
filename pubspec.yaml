name: dietry
description: Dietry diet diary
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.2.0+255

environment:
  sdk: '>=3.0.2 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  fl_chart: ^1.2.0
  flutter_appauth: ^12.0.0
  flutter_web_auth_2: ^5.0.1
  flutter_secure_storage: ^10.0.0
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.2
  http: ^1.6.0
  shelf: ^1.4.2
  web: ^1.1.1
  postgrest: ^2.6.0
  dio: ^5.9.2
  cookie_jar: ^4.0.9
  path: ^1.9.0
  path_provider: ^2.1.5
  share_plus: ^13.2.0
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  # Web: routes sqflite through an IndexedDB/WASM-backed factory so the same
  # LocalDataService SQL runs in the browser (offline mirror, all platforms).
  # Requires web assets copied via `dart run sqflite_common_ffi_web:setup`.
  sqflite_common_ffi_web: ^1.1.0
  file_selector: ^1.0.3
  flutter_image_compress: ^2.3.0
  image_picker: ^1.1.2
  uuid: ^4.5.1
  dio_cookie_manager: ^3.4.0
  dart_jsonwebtoken: ^3.4.0
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  # Resolves the device's IANA timezone so scheduled reminders use local time
  # (tz.setLocalLocation); without it tz.local defaults to UTC.
  flutter_timezone: ^5.1.0
  logger: ^2.0.0

  # Voice input for the "describe your meal" flow (on-device speech-to-text).
  # Needs mic permission (Android RECORD_AUDIO, iOS NSMicrophone/Speech usage).
  speech_to_text: ^7.0.0

  shared_preferences: ^2.3.5

  # Health Connect (Android) / HealthKit (iOS)
  # Benötigt Android minSdkVersion 26 (android/app/build.gradle)
  health: ^13.3.1

  # Cloud Edition Features — Community: Stubs (No-Ops)
  # Cloud Edition: via dependency_overrides in pubspec_overrides.yaml ersetzen:
  #   dependency_overrides:
  #     dietry_cloud:
  #       git:
  #         url: git@github.com:yourorg/dietry-cloud.git
  #         ref: main
  dietry_cloud:
    path: packages/dietry_cloud
  package_info_plus: ^10.2.0

  # Barcode scanner (Android, iOS, macOS, web; Linux: manual text-entry fallback)
  # 7.x uses Apple's Vision framework on iOS/macOS (no GoogleMLKit), avoiding a
  # MLKitVision version clash with google_mlkit_text_recognition (label OCR).
  mobile_scanner: ^7.2.0
  tutorial_coach_mark: ^1.3.3

# win32 5 -> 6 migration. share_plus 13 + package_info_plus 10 require win32 ^6,
# which forces win32 6 graph-wide. These two plugins ship a win32-6 build only in
# versions newer than their parents endorse, and their Windows FFI is compiled on
# every platform (dart.library.ffi conditional import), so on win32 6 the OLD
# versions fail the Linux/desktop *compile* ("not a constant expression", changed
# HRESULT/HKEY signatures). Forcing the newer builds fixes it; they transitively
# pull win32 6.3.0 + win32_registry 3.0.3, so no explicit win32 override is needed.
# (file_picker had NO win32-6 release, so its single use was moved to file_selector.)
# Drop these overrides once flutter_secure_storage / the device_info_plus parent
# endorse their win32-6 builds.
dependency_overrides:
  flutter_secure_storage_windows: ^4.2.2
  device_info_plus: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Testing-Framework für Mocks
  mockito: ^5.6.4
  build_runner: ^2.4.8

  # Icon-Generierung für Android und Web
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#6fcfc8"
  adaptive_icon_foreground: "assets/icon/icon.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#6fcfc8"
    theme_color: "#6fcfc8"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # Enable code generation for localization
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
