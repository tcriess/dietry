<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#673ab7">
  <title>Reset Password – Dietry</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #f5f0ff; color: #1a1a2e;
    }
    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 8px 40px rgba(103,58,183,.16);
      padding: 40px 36px; width: 100%; max-width: 400px; margin: 24px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo svg { width: 48px; height: 48px; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; text-align: center; }
    p.sub { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #374151; }
    input[type=password] {
      width: 100%; padding: 12px 14px; font-size: 15px;
      border: 1.5px solid #d1d5db; border-radius: 8px; outline: none;
      transition: border-color .2s;
    }
    input[type=password]:focus { border-color: #673ab7; }
    .field { margin-bottom: 16px; }
    .error-msg { font-size: 12px; color: #c5221f; margin-top: 4px; display: none; }
    button[type=submit] {
      width: 100%; padding: 13px; font-size: 16px; font-weight: 600;
      background: #673ab7; color: #fff; border: none; border-radius: 8px;
      cursor: pointer; transition: background .2s; margin-top: 4px;
    }
    button[type=submit]:hover { background: #4527a0; }
    button[type=submit]:disabled { opacity: .6; cursor: not-allowed; }
    .spinner {
      border: 3px solid #ede7f6; border-top-color: #673ab7;
      border-radius: 50%; width: 22px; height: 22px;
      animation: spin .8s linear infinite; display: none;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { text-align: center; display: none; }
    .success .check { font-size: 48px; margin-bottom: 12px; }
    .success h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .success p { font-size: 14px; color: #6b7280; margin-bottom: 20px; }
    .success a {
      display: inline-block; padding: 12px 28px; background: #673ab7;
      color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600;
    }
    .success a:hover { background: #4527a0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="12" fill="#673ab7"/>
        <path d="M24 12c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12S30.627 12 24 12zm0 4a8 8 0 110 16 8 8 0 010-16zm0 3a5 5 0 100 10 5 5 0 000-10z" fill="white"/>
      </svg>
    </div>

    <div id="form-section">
      <h1 id="title">Reset password</h1>
      <p class="sub" id="subtitle">Enter your new password below.</p>

      <form id="resetForm" novalidate>
        <div class="field">
          <label for="password" id="label-password">New password</label>
          <input type="password" id="password" autocomplete="new-password" required>
          <div class="error-msg" id="err-password"></div>
        </div>
        <div class="field">
          <label for="confirm" id="label-confirm">Confirm password</label>
          <input type="password" id="confirm" autocomplete="new-password" required>
          <div class="error-msg" id="err-confirm"></div>
        </div>
        <div class="error-msg" id="err-general" style="display:none; margin-bottom:12px; font-size:13px;"></div>
        <button type="submit" id="submitBtn">
          <span id="btnLabel">Set new password</span>
          <div class="spinner" id="spinner"></div>
        </button>
      </form>
    </div>

    <div class="success" id="success-section">
      <div class="check">✅</div>
      <h2 id="success-title">Password updated!</h2>
      <p id="success-sub">Your password has been changed. You can now sign in.</p>
      <a href="/app.html" id="success-cta">Open App</a>
    </div>
  </div>

  <script>
    const AUTH_BASE_URL = localStorage.getItem('dietry_auth_base_url')
      || 'https://ep-restless-mode-ale048t6.neonauth.c-3.eu-central-1.aws.neon.tech/neondb/auth';

    // ── i18n ─────────────────────────────────────────────────────────────────
    const T = {
      en: {
        title: 'Reset password', subtitle: 'Enter your new password below.',
        labelPassword: 'New password', labelConfirm: 'Confirm password',
        btnLabel: 'Set new password',
        expiry: 'This link expires after 15 minutes.',
        errRequired: 'Required', errTooShort: 'At least 8 characters',
        errMismatch: 'Passwords do not match',
        errInvalidToken: 'This reset link has expired or is invalid. Please request a new one.',
        successTitle: 'Password updated!',
        successSub: 'Your password has been changed. You can now sign in.',
        successCta: 'Open App',
      },
      de: {
        title: 'Passwort zurücksetzen', subtitle: 'Gib dein neues Passwort ein.',
        labelPassword: 'Neues Passwort', labelConfirm: 'Passwort bestätigen',
        btnLabel: 'Passwort setzen',
        expiry: 'Dieser Link ist 15 Minuten gültig.',
        errRequired: 'Pflichtfeld', errTooShort: 'Mindestens 8 Zeichen',
        errMismatch: 'Passwörter stimmen nicht überein',
        errInvalidToken: 'Dieser Reset-Link ist abgelaufen oder ungültig. Bitte fordere einen neuen an.',
        successTitle: 'Passwort geändert!',
        successSub: 'Dein Passwort wurde erfolgreich geändert. Du kannst dich jetzt anmelden.',
        successCta: 'App öffnen',
      },
      es: {
        title: 'Restablecer contraseña', subtitle: 'Introduce tu nueva contraseña.',
        labelPassword: 'Nueva contraseña', labelConfirm: 'Confirmar contraseña',
        btnLabel: 'Establecer contraseña',
        expiry: 'Este enlace caduca a los 15 minutos.',
        errRequired: 'Obligatorio', errTooShort: 'Mínimo 8 caracteres',
        errMismatch: 'Las contraseñas no coinciden',
        errInvalidToken: 'Este enlace ha caducado o no es válido. Solicita uno nuevo.',
        successTitle: '¡Contraseña actualizada!',
        successSub: 'Tu contraseña ha sido cambiada. Ya puedes iniciar sesión.',
        successCta: 'Abrir app',
      },
    };

    function getLang() {
      const saved = localStorage.getItem('dietry-lang');
      if (saved && T[saved]) return saved;
      const browser = (navigator.language || 'en').slice(0, 2).toLowerCase();
      return T[browser] ? browser : 'en';
    }

    const s = T[getLang()];
    document.getElementById('title').textContent        = s.title;
    document.getElementById('subtitle').textContent     = s.subtitle + ' ' + s.expiry;
    document.getElementById('label-password').textContent = s.labelPassword;
    document.getElementById('label-confirm').textContent  = s.labelConfirm;
    document.getElementById('btnLabel').textContent     = s.btnLabel;
    document.getElementById('success-title').textContent = s.successTitle;
    document.getElementById('success-sub').textContent   = s.successSub;
    document.getElementById('success-cta').textContent   = s.successCta;

    // ── Token ─────────────────────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('err-general').textContent = s.errInvalidToken;
      document.getElementById('err-general').style.display = 'block';
      document.getElementById('submitBtn').disabled = true;
    }

    // ── Form submit ───────────────────────────────────────────────────────────
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const errPw    = document.getElementById('err-password');
      const errCf    = document.getElementById('err-confirm');
      const errGen   = document.getElementById('err-general');

      errPw.style.display = errCf.style.display = errGen.style.display = 'none';

      let valid = true;
      if (!password) {
        errPw.textContent = s.errRequired; errPw.style.display = 'block'; valid = false;
      } else if (password.length < 8) {
        errPw.textContent = s.errTooShort; errPw.style.display = 'block'; valid = false;
      }
      if (password !== confirm) {
        errCf.textContent = s.errMismatch; errCf.style.display = 'block'; valid = false;
      }
      if (!valid) return;

      const btn     = document.getElementById('submitBtn');
      const label   = document.getElementById('btnLabel');
      const spinner = document.getElementById('spinner');
      btn.disabled = true; label.style.display = 'none'; spinner.style.display = 'block';

      try {
        const response = await fetch(AUTH_BASE_URL + '/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: password }),
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.message || `Error ${response.status}`);
        }

        document.getElementById('form-section').style.display = 'none';
        document.getElementById('success-section').style.display = 'block';

      } catch (err) {
        errGen.textContent = err.message === 'Failed to fetch'
          ? s.errInvalidToken
          : err.message;
        errGen.style.display = 'block';
        btn.disabled = false; label.style.display = ''; spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
