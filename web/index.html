<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Dein digitales Ernährungstagebuch für gesunde Ernährung">

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#673ab7">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Dietry">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Dietry - Diet Diary</title>
  <link rel="manifest" href="manifest.json">

  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
    // Service Worker Registration (für PWA)
    //
    // Note: we deliberately do NOT auto-reload on 'controllerchange'.  Doing so
    // caused a hard-to-spot bug: when the user clicked "Login with Google" the
    // browser would start navigating to /auth_callback.html, the SW would
    // update during that navigation, skipWaiting()+clients.claim() would fire
    // 'controllerchange' on the still-active page, the handler would call
    // window.location.reload(), and the reload cancelled the pending
    // navigation — so auth_callback.html never ran and the user was thrown
    // back to the login screen.  The SW's skipWaiting + claim already makes
    // the new version take over immediately; no explicit reload is needed.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').then(
          function(registration) {
            console.log('✅ Service Worker registriert:', registration.scope);
          },
          function(err) {
            console.log('❌ Service Worker Registrierung fehlgeschlagen:', err);
          }
        );
      });
    }

    window.addEventListener('load', function(ev) {
      // Set the buildConfig for Flutter Web (required by new load() API)
      if (!_flutter) {
        _flutter = {};
      }
      _flutter.buildConfig = {
        builds: [
          {
            compileTarget: "dartdevc",
            renderer: "canvaskit",
            mainJsPath: "main.dart.js"
          }
        ]
      };

      // Download main.dart.js using the new load() API
      _flutter.loader.load({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
