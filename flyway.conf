# Flyway configuration — Dietry Community Edition schema.
#
# Credentials are NOT here. Pass them via environment variables:
#   FLYWAY_URL, FLYWAY_USER, FLYWAY_PASSWORD
# ...or just DATABASE_URL and use ./flyway.sh, which converts it to JDBC for you.
#
# Run with:  ./flyway.sh info | migrate | validate | baseline

# Versioned migrations run in order, then repeatable ones (functions + seeds)
# run on every migrate whose checksum has changed. sql/legacy/ is deliberately
# NOT a location: those files are history and no longer replay.
flyway.locations=filesystem:sql/migrations,filesystem:sql/repeatable,filesystem:sql/callbacks

# CE and Cloud migrations both land in the same database in the Cloud edition,
# but they live in separate repos and version independently. Each stream keeps
# its OWN history table, so their version numbers never collide.
#   CE    -> flyway_history_ce      (this file)
#   Cloud -> flyway_history_cloud   (../dietry-cloud/flyway.conf)
flyway.table=flyway_history_ce

flyway.schemas=public
flyway.defaultSchema=public

# An existing database (production, or a branch of it) already contains
# everything V1 describes. `baseline` stamps it as "V1 applied" without running
# it, so migrate starts at V2. A brand-new database runs V1 for real.
flyway.baselineVersion=0
flyway.baselineDescription=bootstrap (nothing applied)
# Do NOT set baselineOnMigrate=true: it would silently baseline an unexpected
# database instead of failing. Baselining is a deliberate, one-off command.
flyway.baselineOnMigrate=false

# Checksums of applied migrations are verified on every run. This is the whole
# point: editing an already-applied file must fail loudly, not drift silently.
flyway.validateOnMigrate=true

# Neon scales to zero; the first connection after an idle period wakes the
# compute and can take a few seconds.
flyway.connectRetries=10
flyway.connectRetriesInterval=5
