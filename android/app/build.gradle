plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystorePropertiesFile = rootProject.file('key.properties')
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// Read EDITION from config file (ce.json or cloud.json)
def edition = 'community'  // default
try {
    // Try to read from ce.json first (for CE builds)
    def ceConfigFile = rootProject.file('../config/ce.json')
    if (ceConfigFile.exists()) {
        def ceConfig = new groovy.json.JsonSlurper().parse(ceConfigFile)
        edition = ceConfig.EDITION ?: 'community'
    } else {
        // Otherwise try cloud.json (for Cloud builds)
        def cloudConfigFile = rootProject.file('../config/cloud.json')
        if (cloudConfigFile.exists()) {
            def cloudConfig = new groovy.json.JsonSlurper().parse(cloudConfigFile)
            edition = cloudConfig.EDITION ?: 'community'
        }
    }
} catch (Exception e) {
    println "⚠️ Could not read EDITION from config file, defaulting to 'community': $e"
}

def appId = edition == 'cloud' ? 'de.dietry.app' : 'de.dietry.community'

android {
    namespace "com.sws.dietry"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // Application ID is set based on EDITION (community or cloud)
        applicationId appId
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion 26  // Health Connect benötigt Android 8.0+
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // Manifest placeholders
        manifestPlaceholders = [
            'appAuthRedirectScheme': appId,
            'applicationName': 'android.app.Application'
        ]
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig keystorePropertiesFile.exists()
                ? signingConfigs.release
                : signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
