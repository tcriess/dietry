name: DB Migrations

# ── What this guards ──────────────────────────────────────────────────────────
# The Community Edition schema must build STANDALONE — no reference to any
# Cloud-only object. That promise was quietly broken for a long time: migration
# 18 added a foreign key from food_entries to meal_templates, a table only the
# private cloud repo creates, so a fresh CE database could not be built at all.
#
# This job builds CE, alone, against an empty database on every PR. If a CE
# migration ever again names a cloud object, it goes red the same day. It also
# proves the migrations still replay from scratch, which the old hand-numbered
# sql/00..34 chain had silently stopped doing.
#
# Required secrets:
#   NEON_API_KEY     — Neon personal API key (Account settings → API keys)
#   NEON_PROJECT_ID  — the Neon project to create the throwaway branch in

on:
  push:
    branches: [main, develop]
    paths: ['sql/**', 'flyway.conf', 'flyway.sh', '.github/workflows/db-migrations.yml']
  pull_request:
    paths: ['sql/**', 'flyway.conf', 'flyway.sh', '.github/workflows/db-migrations.yml']
  workflow_dispatch:

concurrency:
  group: db-migrations-${{ github.ref }}
  cancel-in-progress: true

env:
  # The database and role that exist on a branch of our project. NOT the action's
  # defaults (neondb / neondb_owner) — ours are both named `dietry`, and with the
  # defaults the action hands back a db_url pointing at a database that does not
  # exist. Not secret; kept here so they are easy to see and change.
  NEON_DATABASE: dietry
  NEON_ROLE: dietry
  # The throwaway, genuinely-empty database we build CE into. A new Neon branch
  # already carries production's schema, so we cannot build into NEON_DATABASE.
  CI_DATABASE: ci_ce_standalone

jobs:
  ce-standalone:
    name: CE schema builds standalone
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Belt and braces: if the runner is cancelled or killed, the "delete branch"
      # step never runs and the branch leaks. Neon expires it for us instead.
      - name: Compute branch expiry
        run: echo "EXPIRES_AT=$(date -u --date '+2 hours' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      # A real Neon branch, not a stock postgres container: we need the real
      # extensions (pg_trgm, unaccent) and the real cluster roles (authenticated,
      # anonymous, authenticator), which a plain container does not have.
      - name: Create throwaway Neon branch
        id: branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: ci-migrations-${{ github.run_id }}
          api_key: ${{ secrets.NEON_API_KEY }}
          database: ${{ env.NEON_DATABASE }}
          role: ${{ env.NEON_ROLE }}
          expires_at: ${{ env.EXPIRES_AT }}

      # Build the connection string explicitly from the action's outputs rather
      # than string-editing db_url — db_url points at NEON_DATABASE, and we need
      # a different database on the same host.
      - name: Create an empty database on the branch
        env:
          BRANCH_URL: ${{ steps.branch.outputs.db_url }}
        run: |
          psql "$BRANCH_URL" -v ON_ERROR_STOP=1 -c "CREATE DATABASE ${CI_DATABASE};"
          echo "DATABASE_URL=postgresql://${NEON_ROLE}:${{ steps.branch.outputs.password }}@${{ steps.branch.outputs.db_host }}/${CI_DATABASE}?sslmode=require" >> "$GITHUB_ENV"

      - name: Build the CE schema from scratch
        run: ./flyway.sh bootstrap

      - name: Assert no Cloud object leaked into CE
        run: |
          leaked=$(psql "$DATABASE_URL" -tAc "
            SELECT coalesce(string_agg(tablename, ', '), '')
            FROM pg_tables WHERE schemaname='public' AND tablename IN
              ('meal_templates','meal_template_ingredients','meal_template_tags',
               'meal_images','food_entry_micros','food_database_micros',
               'user_streaks','user_roles','play_subscriptions');")
          col=$(psql "$DATABASE_URL" -tAc "
            SELECT count(*) FROM information_schema.columns
            WHERE table_name='food_entries' AND column_name='meal_template_id';")
          if [ -n "$leaked" ] || [ "$col" != "0" ]; then
            echo "::error::CE schema contains Cloud-only objects: [$leaked] meal_template_id_columns=$col"
            echo "A CE migration is referencing something only the private cloud repo creates."
            exit 1
          fi
          echo "✅ CE builds standalone — no cloud objects present."

      # CE must not depend on Neon-specific extensions either, or it cannot be
      # self-hosted on stock PostgreSQL. V5 removed the last auth.* call.
      - name: Assert CE needs no Neon-specific extension
        run: |
          neon_ext=$(psql "$DATABASE_URL" -tAc "
            SELECT coalesce(string_agg(extname, ', '), '')
            FROM pg_extension WHERE extname NOT IN ('plpgsql','pg_trgm','unaccent');")
          if [ -n "$neon_ext" ]; then
            echo "::error::CE schema pulled in a non-portable extension: $neon_ext"
            exit 1
          fi
          echo "✅ CE uses only plpgsql, pg_trgm, unaccent."

      # Flyway re-verifies every applied migration's checksum. This is what makes
      # editing an already-applied file a loud failure instead of silent drift.
      - name: Validate checksums
        run: ./flyway.sh validate

      - name: Delete throwaway Neon branch
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: ci-migrations-${{ github.run_id }}
          api_key: ${{ secrets.NEON_API_KEY }}
