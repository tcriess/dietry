name: Build & Release

# ── Triggers ──────────────────────────────────────────────────────────────────
# • push to main      → lint + test + build all (CI check, no release upload)
# • release published → lint + test + build all + attach artifacts to release
# • workflow_dispatch → manual run with optional server deploy
on:
  push:
    branches: [main, develop, feature/*, issue/*]
  pull_request:
    branches: [main, develop, feature/*, issue/*]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_web:
        description: 'Build web version (WebAssembly)'
        type: boolean
        default: true
      deploy_web:
        description: 'Deploy web build to server'
        type: boolean
        default: false
      build_linux:
        description: 'Build Linux desktop app'
        type: boolean
        default: false
      build_android:
        description: 'Build Android APK and App Bundle'
        type: boolean
        default: false
      build_macos:
        description: 'Build macOS desktop app'
        type: boolean
        default: false
      build_windows:
        description: 'Build Windows desktop app'
        type: boolean
        default: false
      build_ios:
        description: 'Build iOS app (requires Apple signing secrets)'
        type: boolean
        default: false

# ── Global env ────────────────────────────────────────────────────────────────
env:
  FLUTTER_VERSION: '3.41.6'   # pin for reproducible builds; bump deliberately
  JAVA_VERSION: '21'
  ANDROID_KEYSTORE_BASE64: ${{ (github.ref_name == 'main' || github.event_name == 'release') && secrets.ANDROID_PROD_KEYSTORE_BASE64 || secrets.ANDROID_DEV_KEYSTORE_BASE64 }}
  ANDROID_KEYSTORE_PASSWORD: ${{ (github.ref_name == 'main' || github.event_name == 'release') && secrets.ANDROID_PROD_KEYSTORE_PASSWORD || secrets.ANDROID_DEV_KEYSTORE_PASSWORD }}
  ANDROID_KEY_PASSWORD: ${{ (github.ref_name == 'main' || github.event_name == 'release') && secrets.ANDROID_PROD_KEY_PASSWORD || secrets.ANDROID_DEV_KEY_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ (github.ref_name == 'main' || github.event_name == 'release') && vars.ANDROID_PROD_KEY_ALIAS || vars.ANDROID_DEV_KEY_ALIAS }}
  CE_CONFIG_JSON: ${{ (github.ref_name == 'main' || github.event_name == 'release') && secrets.CE_PROD_CONFIG_JSON || secrets.CE_DEV_CONFIG_JSON }}  # Must contain the full JSON config for CE builds
  DEPLOY_SSH_KEY: ${{ (github.ref_name == 'main' || github.event_name == 'release') && secrets.DEPLOY_PROD_SSH_KEY || secrets.DEPLOY_DEV_SSH_KEY}}  # Optional: required for server deploy step
  DEPLOY_HOST: ${{ (github.ref_name == 'main' || github.event_name == 'release') && vars.DEPLOY_PROD_HOST || vars.DEPLOY_DEV_HOST }}
  DEPLOY_USER: ${{ (github.ref_name == 'main' || github.event_name == 'release') && vars.DEPLOY_PROD_USER || vars.DEPLOY_DEV_USER }}
  DEPLOY_PORT: ${{ (github.ref_name == 'main' || github.event_name == 'release') && vars.DEPLOY_PROD_PORT || vars.DEPLOY_DEV_PORT || '22' }}
  DEPLOY_PATH: ${{ (github.ref_name == 'main' || github.event_name == 'release') && vars.DEPLOY_PROD_PATH || vars.DEPLOY_DEV_PATH }}
  DEPLOY_TMP_PATH: ${{ (github.ref_name == 'main' || github.event_name == 'release') && vars.DEPLOY_PROD_TMP_PATH || vars.DEPLOY_DEV_TMP_PATH || '/tmp' }}

# Cancel in-progress runs on the same branch/PR (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents: write

# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ── 1. Lint & Test ──────────────────────────────────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test


  # ── 2. Web ──────────────────────────────────────────────────────────────────
  web:
    name: Web (Community Edition)
    runs-on: ubuntu-latest
    needs: lint-test
    if: (github.event_name == 'workflow_dispatch' && inputs.build_web == true) || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Write production config
        # CE_PROD_JSON secret must contain the full JSON, e.g.:
        # { "DATA_API_URL": "...", "AUTH_BASE_URL": "...", "ENVIRONMENT": "production", "EDITION": "community" }
        run: echo '${{ env.CE_CONFIG_JSON }}' > config/ce.json

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (WebAssembly)
        run: |
          flutter build web --release --wasm \
            --dart-define-from-file=config/ce.json \
            --dart-define=GIT_HASH=$(git rev-parse --short HEAD) \
            --dart-define=BUILD_DATE=$(date -u +%Y-%m-%d)

      - name: Package
        run: tar -C build/web -czf dietry-ce-web.tar.gz .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dietry-ce-web
          path: dietry-ce-web.tar.gz
          retention-days: 30

      - name: Attach to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dietry-ce-web.tar.gz

      # ── Optional: deploy to production server ──────────────────────────────
      # Required secrets: DEPLOY_SSH_KEY, DEPLOY_HOST, DEPLOY_USER,
      #                   DEPLOY_PORT (default 22), DEPLOY_PATH
      - name: Deploy to server
        if: |
          github.ref_name == 'develop' ||
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && inputs.deploy_web == true)
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          scp -i ~/.ssh/deploy_key -P "${{ env.DEPLOY_PORT}}" \
              -o StrictHostKeyChecking=no \
              dietry-ce-web.tar.gz \
              "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_TMP_PATH }}/dietry-ce-web.tar.gz"
          ssh -i ~/.ssh/deploy_key -p "${{ env.DEPLOY_PORT }}" \
              -o StrictHostKeyChecking=no \
              "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
              "tar -C '${{ env.DEPLOY_PATH }}' -xzf ${{ env.DEPLOY_TMP_PATH}}/dietry-ce-web.tar.gz \
               && rm ${{ env.DEPLOY_TMP_PATH }}/dietry-ce-web.tar.gz"


  # ── 3. Linux Desktop ────────────────────────────────────────────────────────
  linux:
    name: Linux Desktop (Community Edition)
    runs-on: ubuntu-latest
    needs: lint-test
    if: (github.event_name == 'workflow_dispatch' && inputs.build_linux == true) || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libwebkit2gtk-4.1-dev libsecret-1-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Write production config
        run: echo '${{ env.CE_CONFIG_JSON }}' > config/ce.json

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: |
          flutter build linux --release \
            --dart-define-from-file=config/ce.json \
            --dart-define=GIT_HASH=$(git rev-parse --short HEAD) \
            --dart-define=BUILD_DATE=$(date -u +%Y-%m-%d)

      - name: Package
        run: |
          tar -C build/linux/x64/release/bundle \
              -czf dietry-ce-linux-x64.tar.gz .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dietry-ce-linux
          path: dietry-ce-linux-x64.tar.gz
          retention-days: 30

      - name: Attach to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dietry-ce-linux-x64.tar.gz


  # ── 4. Android ──────────────────────────────────────────────────────────────
  android:
    name: Android (Community Edition)
    runs-on: ubuntu-latest
    needs: lint-test
    if: (github.event_name == 'workflow_dispatch' && inputs.build_android == true) || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Write production config
        run: echo '${{ env.CE_CONFIG_JSON }}' > config/ce.json

      - name: Decode keystore
        # ANDROID_KEYSTORE_BASE64: base64-encoded .jks file
        # Generate with: base64 -w 0 release.jks
        run: |
          echo '${{ env.ANDROID_KEYSTORE_BASE64 }}' \
            | base64 --decode > android/app/release.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ env.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ env.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ env.ANDROID_KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Extract edition from config
        id: config
        run: |
          EDITION=$(jq -r '.EDITION' config/ce.json)
          echo "edition=$EDITION" >> $GITHUB_OUTPUT

      - name: Build APK (direct install)
        run: |
          flutter build apk --release \
            --dart-define-from-file=config/ce.json \
            --dart-define=flutter.edition=${{ steps.config.outputs.edition }} \
            --dart-define=GIT_HASH=$(git rev-parse --short HEAD) \
            --dart-define=BUILD_DATE=$(date -u +%Y-%m-%d) \
            --build-name="${{ github.ref_name }}" \
            --build-number="${{ github.run_number }}"

      - name: Build App Bundle (Play Store)
        run: |
          flutter build appbundle --release \
            --dart-define-from-file=config/ce.json \
            --dart-define=flutter.edition=${{ steps.config.outputs.edition }} \
            --dart-define=GIT_HASH=$(git rev-parse --short HEAD) \
            --dart-define=BUILD_DATE=$(date -u +%Y-%m-%d) \
            --build-name="${{ github.ref_name }}" \
            --build-number="${{ github.run_number }}"

      - name: Rename release artifacts
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | cut -d' ' -f2)
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
          TAG="${VERSION}-${BRANCH}"
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dietry-ce-${TAG}.apk"
          cp build/app/outputs/bundle/release/app-release.aab \
             "dietry-ce-${TAG}.aab"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dietry-ce-android
          path: |
            dietry-ce-*.apk
            dietry-ce-*.aab
          retention-days: 30

      - name: Attach to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dietry-ce-*.apk
            dietry-ce-*.aab


  # ── 5. macOS Desktop ────────────────────────────────────────────────────────
  macos:
    name: macOS Desktop (Community Edition)
    runs-on: macos-latest
    needs: lint-test
    if: github.event_name == 'workflow_dispatch' && inputs.build_macos == true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Write production config
        run: echo '${{ env.CE_CONFIG_JSON }}' > config/ce.json

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: |
          flutter build macos --release \
            --dart-define-from-file=config/ce.json \
            --dart-define=GIT_HASH=$(git rev-parse --short HEAD) \
            --dart-define=BUILD_DATE=$(date -u +%Y-%m-%d)

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r ${{ github.workspace }}/dietry-ce-macos.zip Dietry.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dietry-ce-macos
          path: dietry-ce-macos.zip
          retention-days: 30


  # ── 6. Windows Desktop ──────────────────────────────────────────────────────
  windows:
    name: Windows Desktop (Community Edition)
    runs-on: windows-latest
    needs: lint-test
    if: github.event_name == 'workflow_dispatch' && inputs.build_windows == true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Write production config
        run: echo '${{ env.CE_CONFIG_JSON }}' > config/ce.json

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: |
          $git_hash = git rev-parse --short HEAD
          $build_date = (Get-Date -AsUTC -Format 'yyyy-MM-dd')
          flutter build windows --release `
            --dart-define-from-file=config/ce.json `
            --dart-define="GIT_HASH=$git_hash" `
            --dart-define="BUILD_DATE=$build_date"
        shell: pwsh

      - name: Package
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath dietry-ce-windows.zip
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dietry-ce-windows
          path: dietry-ce-windows.zip
          retention-days: 30


  # ── 7. iOS ──────────────────────────────────────────────────────────────────
  ios:
    name: iOS (Community Edition)
    runs-on: macos-latest
    needs: lint-test
    if: github.event_name == 'workflow_dispatch' && inputs.build_ios == true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Write production config
        run: echo '${{ env.CE_CONFIG_JSON }}' > config/ce.json

      - name: Import signing certificate
        # IOS_CERTIFICATE_BASE64: base64-encoded .p12 file
        # Generate with: base64 -i Certificates.p12 | pbcopy
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        # IOS_PROVISIONING_PROFILE_BASE64: base64-encoded .mobileprovision file
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Install dependencies
        run: flutter pub get

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --dart-define-from-file=config/ce.json \
            --dart-define=GIT_HASH=$(git rev-parse --short HEAD) \
            --dart-define=BUILD_DATE=$(date -u +%Y-%m-%d) \
            --build-name="${{ github.ref_name }}" \
            --build-number="${{ github.run_number }}" \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dietry-ce-ios
          path: build/ios/ipa/*.ipa
          retention-days: 30
